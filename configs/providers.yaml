providers:
  default: mock
  mock:
    type: mock
    model: mock-diagnosis-v1
    timeout: 5
    max_tokens: 512
  openai:
    type: openai
    model: gpt-4o-mini
    api_key_env: OPENAI_API_KEY
    base_url: https://api.openai.com/v1
    timeout: 30
    max_tokens: 1024
  anthropic:
    type: anthropic
    model: claude-3-5-haiku-latest
    api_key_env: ANTHROPIC_API_KEY
    base_url: https://api.anthropic.com
    timeout: 30
    max_tokens: 1024
  ollama:
    type: ollama
    model: llama3.2
    base_url: http://localhost:11434
    timeout: 30
    max_tokens: 1024
